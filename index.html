<!DOCTYPE html>
<html>
<head>
<title>Birthday Quiz for Sapna 🎂</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
padding:30px;
background:url('https://lh3.googleusercontent.com/pw/AP1GczOIEP67lMpx5UEDzv9T7YF24x-_K8ZAzKlPBIUqgpXYP49OeRQ66Pw9v-eB_bvm3WyZMrOxz5NpfcreM8KxO2taldgbQSWHny99Q-wgeonZSuxwKOoM3AHbLlYIUyE8n3NC5sLXpXO3PKAFpCbUHNw=w608-h913-s-no-gm?authuser=0') no-repeat center center fixed;
background-size:cover;
}

#box{
background:rgba(255,255,255,0.9);
padding:30px;
border-radius:15px;
max-width:600px;
margin:auto;
}

button{
padding:10px 20px;
font-size:16px;
background:#ff4d88;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

input{
padding:10px;
width:80%;
margin-top:10px;
font-size:16px;
border-radius:5px;
border:1px solid #ccc;
}

</style>
</head>

<body>

<div id="box">

<h2 id="qtext">1. Are you fine? 🙂</h2>

<input type="text" id="answer" placeholder="Type your answer">

<br>

<button onclick="nextQuestion()">Next</button>

</div>

<script>

// Initialize EmailJS with your public key
(function(){
emailjs.init("aTNGSy2m2EwEF-6m8"); // ← public key
})();

let questions=[
"1. Are you fine? 🙂",
"2. What was your first reaction when you saw the gift? 🎁",
"3. If this surprise had a secret planner, who would you suspect first? 👀",
"4. If you rate this gift (1-10) what would you give? ⭐",
"5. Which emoji describes your mood now? 😄",
"6. If you describe this gift in one word, what would it be? ✨",
"7. Did this surprise feel unexpected? 🎉",
"8. Are you enjoying this quiz? 😄",
"9. Last question… will you send me a smile? 😊"
];

let answers=[];
let q=0;

function nextQuestion(){

let ans=document.getElementById("answer").value.trim();

if(ans===""){
alert("Please enter your answer!");
return;
}

answers.push(questions[q] + " → " + ans);

document.getElementById("answer").value="";

q++;

if(q<questions.length){
document.getElementById("qtext").innerText=questions[q];
}else{
sendEmail();
document.getElementById("box").innerHTML=`
<h2>🎉 Quiz Completed 😄</h2>
<p>Thank you for playing 💖</p>
<button onclick="secretQuestion()">Continue</button>
`;
}

}

function sendEmail(){
let allAnswers = answers.join("\n\n");

emailjs.send("service_b20g8i1","template_clk64s8",{
message: allAnswers,
time: new Date().toLocaleString()
})
.then(function(response){
console.log("SUCCESS!", response.status, response.text);
}, function(error){
console.log("FAILED...", error);
});
}

function secretQuestion(){
document.getElementById("box").innerHTML=`
<h2>Do you want to know who I am? 🤫</h2>
<button onclick="revealSecret('yes')">Yes</button>
<button onclick="revealSecret('no')">No</button>
`;
}

function revealSecret(ans){
if(ans==="yes"){
document.getElementById("box").innerHTML=`
<h2>🎉 Surprise! 🎉</h2>
<p>Kya kroge jaan kar? 😏</p>
<img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" width="200">
<p>Enjoy your special day 💖</p>
`;
}else{
document.getElementById("box").innerHTML=`
<h2>Alright 😄 Enjoy your day ✨</h2>
<img src="https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif" width="200">
`;
}
}

</script>

</body>
</html>
