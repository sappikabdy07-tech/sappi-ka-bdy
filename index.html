<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Quiz for Sapna 🎂✨</title>
<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: url('https://lh3.googleusercontent.com/pw/AP1GczOIEP67lMpx5UEDzv9T7YF24x-_K8ZAzKlPBIUqgpXYP49OeRQ66Pw9v-eB_bvm3WyZMrOxz5NpfcreM8KxO2taldgbQSWHny99Q-wgeonZSuxwKOoM3AHbLlYIUyE8n3NC5sLXpXO3PKAFpCbUHNw=w608-h913-s-no-gm?authuser=0') no-repeat center center fixed;
    background-size: cover;
    padding: 40px 20px;
    color: #333;
}

#box {
    background: rgba(255,255,255,0.95);
    padding: 40px 30px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.3);
    max-width: 600px;
    margin: auto;
}

h2 {
    font-size: 24px;
    margin-bottom: 20px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    background: #ff4d88;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 20px;
    transition: 0.3s;
}

button:hover {
    background: #e03e75;
}

input {
    padding: 15px;
    width: 90%;
    max-width: 500px;
    margin-top: 15px;
    font-size: 18px;
    border-radius: 8px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

#welcomeGif {
    width: 180px;
    margin-bottom: 15px;
}
</style>
<script>
let questions = [
"1. Before we start… how are you feeling right now? 🙂",
"2. What was your first reaction when you saw the gift? 🎁",
"3. If this surprise had a secret planner, who would you suspect first? 👀",
"4. If you rate this gift (1-10) what would you give? ⭐",
"5. Which emoji describes your mood now? 😄",
"6. If you describe this gift in one word, what would it be? ✨",
"7. Did this surprise feel unexpected? 🎉",
"8. Are you enjoying this quiz? 😄",
"9. Last question… will you send me a smile? 😊"
];

let answers = [];
let q = -1; // starting with welcome screen

function nextQuestion() {
    let answerInput = document.getElementById("answer");

    if(q >= 0) {
        let ans = answerInput.value.trim();
        if(ans != "") {
            answers.push(ans);
            answerInput.value = "";
            q++;
        } else {
            alert("Please enter an answer!");
            return;
        }
    } else {
        q++; // move from welcome screen to first question
    }

    if(q < questions.length) {
        document.getElementById("question").innerHTML = questions[q];
        document.getElementById("answer").style.display = "block";
        document.getElementById("nextBtn").innerText = "Next";
        document.getElementById("welcomeGif").style.display = "none";
    } else {
        sendToGoogleSheet(answers);
        document.getElementById("box").innerHTML =
        `<h2>🎉 You finished the quiz! 🎉</h2>
        <img src='https://media.giphy.com/media/3oEjI6SIIHBdRxXI40/giphy.gif' width='250'><br><br>
        <p>🎂 <b>Happy Birthday, Sapna!</b> ✨</p>
        <p>Your name means “dream,” and just like your name, you make life colorful and full of hope. May every little dream in your heart come true. Just like these glowing lights around, may your life shine with happiness, love, and warmth. Keep smiling, keep believing in yourself, and never stop chasing your dreams. Today is all about you… enjoy every moment, Sapna! 🌸💖</p>
        <p>Thanks for completing the quiz! 💖</p>`;
    }
}

function sendToGoogleSheet(data){
    fetch("https://script.google.com/macros/s/AKfycbz0fI38S9KEAGFRGHW4TpSv4QVHFEIlA_k2uTbrZ_UvEsKe388px_rj-KdD2Wr2owpj/exec", {
        method: 'POST',
        body: JSON.stringify(data),
        headers: {"Content-Type": "application/json"}
    })
    .then(response => console.log("Answers saved to Google Sheet!"))
    .catch(error => console.error("Error sending to Google Sheet:", error));
}

window.onload = function() {
    document.getElementById("question").innerHTML = 
        "🎉 <b>Happy Birthday, Sapna!</b> 🎂✨ <br>Welcome to your special quiz! 🌸<br>Click Next to start!";
    document.getElementById("answer").style.display = "none";
    document.getElementById("welcomeGif").style.display = "block";
};
</script>
</head>
<body>
<div id="box">
<h2 id="question"></h2>
<img id="welcomeGif" src="https://media.giphy.com/media/26BRrSvJUa0crqw4E/giphy.gif" alt="Birthday GIF"><br>
<input type="text" id="answer" placeholder="Type your answer">
<br>
<button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>
</body>
</html>
